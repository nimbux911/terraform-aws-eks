
image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  tag: 5.0.3-amd64
  pullPolicy: IfNotPresent

## https://docs.fluentbit.io/manual/administration/configuring-fluent-bit/configuration-file
config:
  service: |
    [SERVICE]
        Daemon Off
        Flush {{ .Values.flush }}
        Log_Level {{ .Values.logLevel }}
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port {{ .Values.metricsPort }}
        Health_Check On
  ## https://docs.fluentbit.io/manual/pipeline/inputs
  inputs: |
    [INPUT]
        Name           tail
        Tag            kube.*
        Path           /var/log/containers/*.log
        Parser         cri
        DB             /run/fluent-bit/flb_kube.db
        Mem_Buf_Limit  50MB
  ## https://docs.fluentbit.io/manual/pipeline/filters
  filters: |
    [FILTER]
        Name           kubernetes
        Match          kube.*
        Kube_URL       https://kubernetes.default.svc:443
        Merge_Log On
        K8S-Logging.Exclude Off
        K8S-Logging.Parser Off
 
  ## https://docs.fluentbit.io/manual/pipeline/outputs
  outputs: |
    [OUTPUT]
        Name loki
        Match *
        Host loki-distributed-distributor
        Port 3100
        Uri /loki/api/v1/push
        Labels job=fluent-bit
        RemoveKeys kubernetes,stream
        Auto_Kubernetes_Labels off
        Label_Map_Path /fluent-bit/etc/conf/labelmap.json
        Line_Format key_value

  # https://docs.fluentbit.io/manual/pipeline/parsers
  customParsers: |
    [PARSER]
        Name cri
        Format regex
        Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

  # This allows adding more files with arbitary filenames to /fluent-bit/etc by providing key/value pairs.
  # The key becomes the filename, the value becomes the file content.
  extraFiles: 
    labelmap.json: |
      {
        "kubernetes": {
          "container_name": "container",
          "host": "node",
          "labels": {
            "app": "app",
            "release": "release",
            "pod-template-hash": "template_hash"
          },
          "namespace_name": "namespace",
          "pod_name": "pod"
        },
        "stream": "stream"
      }

logLevel: warn
